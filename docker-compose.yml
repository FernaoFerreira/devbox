# =============================================
# docker-compose.yml - Orquestração dos Serviços
# =============================================
# Este arquivo define e conecta todos os containers do nosso ambiente.
# Execute com: docker-compose up --build

version: '3.8'

# -----------------------------------------------
# SERVIÇOS: cada bloco é um container diferente
# -----------------------------------------------
services:

  # ----------------------------
  # 1. FRONTEND (React + Vite)
  # ----------------------------
  frontend:
    # 'build' diz ao Docker para construir a imagem usando um Dockerfile local
    build:
      context: ./frontend   # Pasta onde está o código e o Dockerfile
      dockerfile: Dockerfile
    # 'volumes' conecta uma pasta local com uma pasta dentro do container
    # Sintaxe: pasta_local:pasta_no_container
    # Efeito: qualquer mudança no seu código local é imediatamente refletida no container
    volumes:
      - ./frontend:/app                  # Código-fonte (hot-reload)
      - frontend_node_modules:/app/node_modules  # Preserva os node_modules do container
    # 'networks' conecta este container à nossa rede customizada
    networks:
      - app-network

  # ----------------------------
  # 2. BACKEND (NestJS)
  # ----------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app                   # Código-fonte (hot-reload)
      - backend_node_modules:/app/node_modules   # Preserva os node_modules do container
    # 'environment' injeta variáveis de ambiente no container
    # ${VARIAVEL} lê o valor do arquivo .env na raiz do projeto
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    # 'depends_on' garante que o banco de dados inicie antes do backend
    depends_on:
      - db
    networks:
      - app-network

  # ----------------------------
  # 3. BANCO DE DADOS (PostgreSQL)
  # ----------------------------
  db:
    # Usa a imagem oficial do PostgreSQL com Alpine (sem Dockerfile customizado)
    image: postgres:alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Volume nomeado: os dados do banco ficam salvos no Docker,
      # e sobrevivem mesmo após 'docker-compose down'
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # ----------------------------
  # 4. ADMIN DO BANCO (pgAdmin)
  # ----------------------------
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      # Persiste configurações do pgAdmin (servidores salvos, preferências)
      - pgadmin_data:/var/lib/pgadmin
    # 'ports' mapeia uma porta do host para uma porta do container
    # Sintaxe: porta_do_host:porta_do_container
    # ${PGADMIN_PORT} vem do arquivo .env
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - db
    networks:
      - app-network

  # ----------------------------
  # 5. PROXY REVERSO (Nginx)
  # ----------------------------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      # Porta principal: acesse http://localhost para ver a aplicação
      - "${NGINX_PORT}:80"
    # O Nginx só deve iniciar depois que frontend e backend estiverem prontos
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

# -----------------------------------------------
# VOLUMES: armazenamento persistente gerenciado pelo Docker
# -----------------------------------------------
volumes:
  postgres_data:      # Dados do PostgreSQL
  pgadmin_data:       # Configurações do pgAdmin
  frontend_node_modules:  # node_modules do frontend (isolado do host)
  backend_node_modules:   # node_modules do backend (isolado do host)

# -----------------------------------------------
# REDES: comunicação entre containers
# -----------------------------------------------
networks:
  app-network:
    # 'bridge' é o driver padrão para redes locais
    # Permite que os containers se comuniquem pelo nome do serviço (ex: 'db', 'backend')
    driver: bridge