# =============================================
# nginx.conf - Configuração do Proxy Reverso
# =============================================

# 'events' é obrigatório no nginx.conf - define configurações de conexão
events {
    # Número máximo de conexões simultâneas por worker process
    worker_connections 1024;
}

http {
    # Bloco 'server': define um servidor virtual (nosso proxy reverso)
    server {
        # O Nginx vai escutar na porta 80 dentro do container
        listen 80;

        # -----------------------------------------------
        # ROTA 1: Requisições para /api/ → Backend (NestJS)
        # -----------------------------------------------
        # location /api/ captura qualquer URL que começa com /api/
        location /api/ {
            # rewrite: REMOVE o prefixo /api antes de encaminhar
            # Explicação do regex:
            #   ^/api/(.*)  → captura tudo depois de /api/
            #   /$1         → envia apenas o que foi capturado
            # Exemplo: /api/users → /users no backend
            rewrite ^/api/(.*) /$1 break;

            # proxy_pass: encaminha a requisição para o serviço 'backend'
            # 'backend' é o nome do serviço no docker-compose.yml
            # O Docker resolve esse nome via DNS interno da rede bridge
            proxy_pass http://backend:3000;

            # Headers importantes para o backend saber de onde veio a requisição
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # -----------------------------------------------
        # ROTA 2: Todas as outras requisições → Frontend (React/Vite)
        # -----------------------------------------------
        # location / captura TUDO que não foi capturado por /api/
        location / {
            # Encaminha para o serviço 'frontend' na porta 5173
            proxy_pass http://frontend:5173;

            # Headers necessários para o hot-reload do Vite funcionar
            # O Vite usa WebSocket para notificar o browser sobre mudanças
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}